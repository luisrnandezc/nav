{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargando PDF - NAV</title>
    <link rel="stylesheet" href="{% static 'fms/pdf_download.css' %}">
</head>
<body>
    <div class="container">
        <h2>Evaluación guardada</h2>
        <div class="loading">
            <p>La planilla se descargará en breve. Si no se descarga sola, pulse el botón de abajo.</p>
        </div>
        <p class="pdf-actions">
            <a id="pdf-download-link" class="btn-primary" href="{{ pdf_url }}">Descargar / abrir PDF</a>
        </p>
        <p class="dashboard-link">
            <a href="{{ dashboard_url }}">Volver al panel principal</a>
        </p>
    </div>

    <!-- Pass Django variables to JavaScript -->
    <div id="pdf-data" 
         data-pdf-url="{{ pdf_url }}" 
         style="display: none;">
    </div>

    <script src="{% static 'fms/js/pdf_download_dynamics.js' %}"></script>
</body>
</html>
